name: CI

on: 
  push:
    branches: 
    - main

permissions:
  id-token: write
  contents: read

jobs:
  login:
    name: Azure Login Test
    runs-on: ubuntu-latest
    steps: 
      - name: Azure Login
        uses: Azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure CLI
        uses: azure/cli@v2
        with:
          inlineScript: |
            az account show
          
  
  
