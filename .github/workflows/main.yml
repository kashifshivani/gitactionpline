name: CI

on: 
  push:
    branches: 
    - main

permissions:
  id-token: write
  contents: read

jobs:
  login:
    name: Azure Login Test
    runs-on: ubuntu-latest
    steps: 
      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure CLI
        uses: azure/cli@v2
        with:
          inlineScript: |
            az account show

  terraform-init-plan:
    needs: login
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure Login  
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform FMT
        id: fmt
        run: terraform fmt
        working-directory: environment/dev
        
          
  
  
